<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>running banner</title>
</head>
<style>

body{
margin:0;
padding:0;
box-sizing:border-box;
background:#0f172a;

}



@keyframes runbanner
{
10%{left:px;}

20%{left:-20%;}
30%{left:-20%;}

40%{left:-40%;}
50%{left:-40%;}

60%{left:-60%;}
70%{left:-60%;}

80%{left:-80%;}
90%{left:-80%;}


}


header
{
width:700%;
height:450px;
background:red;
margin-top:-7px;
box-shadow:10px 10px 10px gray;
}

.pic
{
width:19%;
height:100%;
margin-left:-4px;
position:relative;
left:0px;
animation:runbanner 12s linear infinite alternate-reverse;

@media only screen and (max-width: 600px)
{
body{background:red}
header{
display:none;

}


/* small devices (portrait tablets and large phones, 600px and up) */
@media only screen and (min-width: 600px)
{
body{backgound:rgb(195,214,15)}

header{
dispay:block;
height:140px
}



}

/* medium devices (landscape tablets, 768px and up) */
@media only screen and (min-width: 768px)
{
header{
height:400px;
}


}


</style>
<body>
<header>
<img src="images/img.01.jpg" class="pic">
<img src="images/img.02.jpg" class="pic">
<img src="images/img.03.jpg" class="pic">
<img src="images/img.04.jpg" class="pic">
<img src="images/img.05.jpg" class="pic">

</body>
</html>
