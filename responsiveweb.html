<style>
main

@keyframes zoomout
{
from{transform:scale(3);}
to{transform:scale(1);}
}

/* tag style */
header
{
width:50%;
background:black;
color:white;
margin:auto;
text-align:center;
font-size:70px;
box-shadow:10px 10px 20px cyan;
padding:20px;
font-family:arial black;
text-shadow:5px 5px 5px cyan;
}

body
{
//background:orange;
background-image:url(images/bg.1.jpg);
background-size:cover;
 animation:zoomout 1.50s ease-out;
}

/* class style */
.picstyle
{
width:17%;
height:210px;
border-radius:100px;
box-shadow:5px 5px 10px cyan;
margin:70px;
transition:0.50s;
}

.picstyle:hover
{
transform:scale(1.50)//rotate(360deg);
border-radius:0px;
}

/* Extra small device (phones,600px and down)*/

@media only screen and (max-width: 600px)

{
//body {background:green;}

header
{

//splay:none;

font-size:10px;
height:10px;
padding:5px;
marin-bottom:10px;

}

main

{
margin-left:30px;
}
.picstyle
{
width:80%;height:100%;
margin:10px;
}
}

/*small device (portrait tablets and large phones,600px and up)*/
@media only screen and (min-width:600px)

{
//body{background:orange;}
header
{
font-size:20px;
}
.picstyle
{
width:40%;height:100%;
margin:10px;
boder-radius:0px;
margin-left:40px;
}


/* medium device (landscape tablets, 768px and up)*/
@media only screen and (min-width:768px)
{
//body{background:yellow;}
}

/* large device (laptops/desktops,992px and up)*/
@media only screen and (min-width:992px)
{
//body{background:cyan;}
header
{
font-size:50px;
}
.picstyle
{
width:17%;
height:210px;
border-radius:100px;
box-shadow:5px 5px 10px magenta;
margin:70px;
transition:0.50s;
}

}


</style>
