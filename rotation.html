<style>
  @keyframes ani1
  {
    /*
    from{transform:rotateX(0deg) rotateY(0deg) translate(150px,100px)}
    to{transform:rotateX(360deg) rotateY(150deg) translate(150px,100px)}
    */

    from{transform:translate(100px,100px)  rotate3d(0, 0, 0, 45deg);}
    to{transform:translate(100px,100px) rotate3d(160, 160, -100, 360deg);}



  }

 //backface-visibility:hidden;

animation:ani1 6s infinite alternate;

 margin-left:-130px;

animation:ani1 6s infinite alternate;
